<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>麻雀配牌ゲーム</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section id="landscapeOnly" class="landscape-only" aria-live="polite">
        <h1>横向きにしてください</h1>
      </section>

      <section id="game" class="game-area" aria-label="麻雀配牌">
        <h1 class="title">麻雀 配牌練習</h1>
        <div id="hand-area" class="hand" aria-label="13枚の配牌"></div>
        <p id="shantenDisplay" class="shanten-display" aria-live="polite">現在のシャンテン数：-</p>
        <p id="shantenError" class="shanten-error" aria-live="assertive"></p>
        <button id="nextButton" type="button" class="next-button">次の問題</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
